<!doctype html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#fff">

    <title>xObywatel 4.0</title>

    <!-- THEME INIT -->
    <script>
        !function () {
            try {
                var e = localStorage.getItem("theme-preference"),
                    t = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches,
                    a = e || (t ? "dark" : "light");
                document.documentElement.setAttribute("data-theme", a)
            } catch (e) { }
        }()
    </script>

    <!-- BASIC STYLE -->
    <style>
        body {
            margin: 0;
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #f5f6fb;
            opacity: 0;
            transition: opacity .15s;
        }

        body.loaded {
            opacity: 1;
        }

        .app-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: #fff;
            height: 60px;
            display: flex;
            align-items: center;
            padding: 0 20px;
            box-shadow: 0 1px 3px rgba(0, 0, 0, .1);
        }

        main {
            background: linear-gradient(135deg, #667eea 0, #764ba2 100%);
            margin: 16px 20px 0;
            height: 45vh;
            border-radius: 12px 12px 0 0;
        }
    </style>

    <!-- DEV CONFIG -->
    <script src="js/dev-config.js"></script>

    <!-- SECURITY CHECK -->
    <script>
        (function () {
            "use strict";

            if (window.DEV_CONFIG && window.DEV_CONFIG.DEV_MODE) {
                console.warn("[DEV_MODE] pomijam zabezpieczenia");
                return;
            }

            function isMobile() {
                const ua = navigator.userAgent.toLowerCase();
                return /android|webos|iphone|ipad|ipod|blackberry|iemobile|opera mini|mobile/i.test(ua);
            }

            function isStandalone() {
                return (
                    window.navigator.standalone === true ||
                    window.matchMedia("(display-mode: standalone)").matches ||
                    window.matchMedia("(display-mode: fullscreen)").matches
                );
            }

            function hasAuthToken() {
                try {
                    const openRequest = indexedDB.open("obywatel_auth", 1);

                    openRequest.onsuccess = function (event) {
                        const db = event.target.result;
                        const tx = db.transaction("auth_state", "readonly");
                        const store = tx.objectStore("auth_state");
                        const getRequest = store.get("auth_state");

                        getRequest.onsuccess = function () {
                            const authState = getRequest.result;
                            if (!authState || !authState.refreshToken) {
                                window.location.href = "./index.html";
                            }
                        };
                    };
                } catch (err) {
                    window.location.href = "./index.html";
                }
            }

            if (!isMobile()) {
                window.location.href = "./index.html";
                document.documentElement.style.display = "none";
                throw new Error("Desktop blocked");
            }

            if (!isStandalone()) {
                window.location.href = "./index.html";
                document.documentElement.style.display = "none";
                throw new Error("Not standalone");
            }

            hasAuthToken();
        })();
    </script>

    <!-- ASSETS -->
    <link rel="icon" href="favicon.ico">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">

    <link rel="preconnect" href="https://butilive.adadad1314asda.workers.dev" crossorigin>

    <link rel="preload" href="css/main.css" as="style">
    <link rel="preload" href="css/common.css" as="style">
    <link rel="preload" href="css/pages/dowod.css" as="style">

    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/pages/dowod.css">
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/overlay-camera.css">

    <!-- JS -->
    <script src="js/theme.js" defer></script>
    <script src="js/header.js" defer></script>
    <script src="js/pages/dowod.js" defer></script>
    <script src="js/protection.js"></script>

    <!-- SERVICE WORKER -->
    <script>
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", function () {

                navigator.serviceWorker.register("/sw.js")
                    .then(function (registration) {
                        console.log("[SW] OK:", registration.scope);
                    })
                    .catch(function (err) {
                        console.error("[SW] ERROR:", err);
                    });

            });
        }
    </script>
</head>

<body>

    <!-- HEADER -->
    <header class="app-header dowod-header">
        <div class="header-left">
            <a href="documents.html" class="back-link">
                <img class="back-icon" src="assets/icons/ab004_arrow_left.svg">

            <span class="header-title fade-in">mDowód</span>
        </div>

        <img class="help-icon" src="assets/dowod/znakzapytania.svg">
    </header>

    <p class="czas"></p>

    <!-- MAIN -->
    <main>
        <section id="lew">
            <div class="photo-container">
                <img id="profileImage" class="photo">
                <img class="photo-border" src="assets/dowod/glowing.png">
            </div>

            <div id="gradient"></div>
            <img src="assets/dowod/flaga_bez.gif" id="flaga">
        </section>

        <section id="praw">
            <div class="cwel"><span id="display-name">Brak danych</span></div>
            <div class="cwel"><span id="display-surname">Brak danych</span></div>
            <div class="cwel"><span id="display-nationality">Brak danych</span></div>
            <div class="cwel"><span id="display-birthDate">Brak danych</span></div>
            <div class="cwel"><span id="display-pesel">Brak danych</span></div>
        </section>
    </main>

    <!-- STATUS -->
    <section id="bottom">
        <svg class="status-checkmark"></svg>
        <p>Dokument ważny</p>
    </section>

    <!-- QUICK ACTIONS -->
    <section class="actions">
        <div class="quick-actions">
            <button>Potwierdź dane</button>
            <button>Dane dokumentu</button>
            <button>Zastrzeż PESEL</button>
            <button>Więcej</button>
        </div>
    </section>

</body>
<script>
document.addEventListener("DOMContentLoaded", () => {
  const data = JSON.parse(localStorage.getItem("mdowod_data"));

  if (!data) return;

  // podstawowe dane
  document.getElementById("display-name").textContent = data.imie || "Brak danych";
  document.getElementById("display-surname").textContent = data.nazwisko || "Brak danych";
  document.getElementById("display-nationality").textContent = data.obywatelstwo || "Brak danych";
  document.getElementById("display-birthDate").textContent = data.dataUrodzenia || "Brak danych";
  document.getElementById("display-pesel").textContent = data.pesel || "Brak danych";

  // dane dokumentu
  document.getElementById("idSeriesMain").textContent = data.seria || "Brak danych";
  document.getElementById("expiryDateMain").textContent = data.expiry || "Brak danych";
  document.getElementById("issueDateMain").textContent = data.issue || "Brak danych";

  // też w overlay (druga sekcja)
  const idSeries = document.getElementById("idSeries");
  if (idSeries) idSeries.textContent = data.seria || "Brak danych";

  const expiry = document.getElementById("expiryDate");
  if (expiry) expiry.textContent = data.expiry || "Brak danych";

  const issue = document.getElementById("issueDate");
  if (issue) issue.textContent = data.issue || "Brak danych";
});
</script>
</html>
