<!doctype html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#fff">

    <title>xObywatel 4.0</title>

    <script>
        !function () {
            try {
                var e = localStorage.getItem("theme-preference"),
                    t = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches,
                    a = e || (t ? "dark" : "light");
                document.documentElement.setAttribute("data-theme", a)
            } catch (e) { }
        }()
    </script>

    <style>
        body {
            margin: 0;
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #f5f6fb;
            opacity: 0;
            transition: opacity .15s;
        }

        body.loaded {
            opacity: 1;
        }

        .app-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: #fff;
            height: 60px;
            display: flex;
            align-items: center;
            padding: 0 20px;
            box-shadow: 0 1px 3px rgba(0, 0, 0, .1);
        }

        main {
            background: linear-gradient(135deg, #667eea 0, #764ba2 100%);
            margin: 16px 20px 0;
            height: 45vh;
            border-radius: 12px 12px 0 0;
        }
    </style>

    <script src="js/dev-config.js"></script>

    <script>
        (function () {
            "use strict";

            if (window.DEV_CONFIG && window.DEV_CONFIG.DEV_MODE) return;

            function isMobile() {
                const ua = navigator.userAgent.toLowerCase();
                return /android|webos|iphone|ipad|ipod|blackberry|iemobile|opera mini|mobile/i.test(ua);
            }

            function isStandalone() {
                return (
                    window.navigator.standalone === true ||
                    window.matchMedia("(display-mode: standalone)").matches ||
                    window.matchMedia("(display-mode: fullscreen)").matches
                );
            }

            if (!isMobile()) {
                window.location.href = "./index.html";
                document.documentElement.style.display = "none";
                throw new Error("Desktop blocked");
            }

            if (!isStandalone()) {
                window.location.href = "./index.html";
                document.documentElement.style.display = "none";
                throw new Error("Not standalone");
            }
        })();
    </script>

    <link rel="icon" href="favicon.ico">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">

    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/pages/dowod.css">
</head>

<body>

    <header class="app-header dowod-header">
        <div class="header-left">
            <a href="documents.html" class="back-link">
                <img class="back-icon" src="assets/icons/ab004_arrow_left.svg">
            </a>
            <span class="header-title fade-in">mDowód</span>
        </div>

        <img class="help-icon" src="assets/dowod/znakzapytania.svg">
    </header>

    <p class="czas"></p>

    <main>
        <section id="lew">
            <div class="photo-container">
                <img id="profileImage" class="photo">
                <img class="photo-border" src="assets/dowod/glowing.png">
            </div>

            <div id="gradient"></div>
            <img src="assets/dowod/flaga_bez.gif" id="flaga">
        </section>

        <section id="praw">
            <div class="cwel"><span id="display-name">Brak danych</span></div>
            <div class="cwel"><span id="display-surname">Brak danych</span></div>
            <div class="cwel"><span id="display-nationality">Brak danych</span></div>
            <div class="cwel"><span id="display-birthDate">Brak danych</span></div>
            <div class="cwel"><span id="display-pesel">Brak danych</span></div>
        </section>
    </main>

    <section id="bottom">
        <svg class="status-checkmark"></svg>
        <p>Dokument ważny</p>
    </section>

    <section class="actions">
        <div class="quick-actions">
            <button>Potwierdź dane</button>
            <button>Dane dokumentu</button>
            <button>Zastrzeż PESEL</button>
            <button>Więcej</button>
        </div>
    </section>

</body>

<script>
document.addEventListener("DOMContentLoaded", () => {
  const data = JSON.parse(localStorage.getItem("mdowod_data"));

  if (!data) return;

  document.getElementById("display-name").textContent = data.imie || "Brak danych";
  document.getElementById("display-surname").textContent = data.nazwisko || "Brak danych";
  document.getElementById("display-nationality").textContent = data.obywatelstwo || "Brak danych";
  document.getElementById("display-birthDate").textContent = data.dataUrodzenia || "Brak danych";
  document.getElementById("display-pesel").textContent = data.pesel || "Brak danych";
});
</script>

</html>
